name = "searxng-worker"
main = "src/index.ts"
compatibility_date = "2025-08-01"

[durable_objects]
bindings = [{ name = "SEARXNG", class_name = "SearxngContainer" }]

[[migrations]]
tag = "v1"
new_classes = ["SearxngContainer"]

[[containers]]
# The Durable-Object class that represents a container instance
class_name   = "SearxngContainer"

# Image now lives in Cloudflare’s registry
image        = "registry.cloudflare.com/<account>/searxng:latest"

# Keep at least one warm copy; drop the line entirely to autoscale
instances    = 1
# Optional: stop if idle
# sleep_after = "10m"

